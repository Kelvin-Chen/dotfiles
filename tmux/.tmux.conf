############################################
######           PLUGINS              ######
############################################
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Reload config
bind r source-file "$HOME/.tmux.conf" \; display "Reloaded!"

# Status bar - uses terminal color indices so it follows any color scheme
set -g status-style "bg=colour0,fg=colour7"
set -g status-justify centre
set -g status-left-length 60
set -g status-right-length 60

set -g status-left "#[reverse,bold] #S #[noreverse,nobold] %H:%M "
set -g status-right " %d %b  #[reverse,bold] #h "

setw -g window-status-style "fg=colour8"
setw -g window-status-format " #I | #W "
setw -g window-status-current-style "fg=colour7,bold"
setw -g window-status-current-format " #I  #W "
setw -g window-status-separator ""
setw -g window-status-activity-style "fg=colour3"

set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour7"
set -g message-style "reverse"

# Enable true color. List all outer terminals that support it so tmux passes
# through 24-bit color sequences correctly.
set -g allow-passthrough on
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-256color:RGB"
set -sa terminal-overrides ",xterm-kitty:RGB"

# Start window number at 1
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Enable mouse
set -g mouse on

# Use OSC 52 to write to the local clipboard over SSH.
# Kitty (and most modern terminals) support this natively.
set -g set-clipboard on

# Fix escape not responding instantly.
set -s escape-time 0

# Vi-style copy mode
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# tmux-yank: copy to system clipboard, stay in copy mode after yanking.
# OSC 52 passthrough (via allow-passthrough above) lets tmux-yank reach the
# local clipboard over SSH automatically.
set -g @yank_action 'copy-pipe-no-clear'
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

run "$HOME/.tmux/plugins/tpm/tpm"
